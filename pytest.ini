[pytest]
# Pytest configuration file

# Django settings module to use for testing
DJANGO_SETTINGS_MODULE = config.test_settings

# Specify where tests are located
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Test discovery paths
testpaths = tests

# Add common options
addopts = 
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Disable warnings (optional, remove if you want to see warnings)
    --tb=short
    # Show slowest tests
    --durations=10
    # Coverage reporting
    --cov=apps
    --cov=config
    --cov-report=html
    --cov-report=term-missing
    # Fail on warnings (optional)
    # -W error
    # Parallel execution (optional, uncomment if you have pytest-xdist)
    # -n auto

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    auth: marks tests that require authentication
    models: marks tests for model functionality
    views: marks tests for view functionality
    serializers: marks tests for serializer functionality
    services: marks tests for service/business logic
    
# Database - Use SQLite with in-memory database
# This is defined in test_settings.py

# Minimum Python version
minversion = 7.0

# Encoding
console_output_style = progress

# Ignore paths
norecursedirs = 
    .git
    .venv
    venv
    env
    .tox
    .pytest_cache
    __pycache__
    node_modules
    static
    media

# Capture output
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG
